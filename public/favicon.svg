  <!-- Gold helix path -->
  <path d="M38.57 38.57 Q47.14 51.43 60 51.43 T81.43 64.29"
    fill="none" stroke="url(#fvGold)" stroke-width="5" stroke-linecap="round"/>

  <!-- Teal helix path -->
  <path d="M38.57 64.29 Q47.14 51.43 60 51.43 T81.43 38.57"
    fill="none" stroke="url(#fvTeal)" stroke-width="5" stroke-linecap="round"/>

  <!-- Centre dot -->
